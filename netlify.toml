# Monorepo: build the Next.js app in `web/`.
# In Netlify UI, leave "Base directory" empty (or `/`) so this `[build].base` is not doubled with `web/web`.
[build]
  base = "web"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
